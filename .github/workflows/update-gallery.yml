name: Update VSCO Gallery

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6:00 AM UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Fetch VSCO images
        run: node scripts/fetch-vsco.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/gallery-images.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated gallery JSON
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/gallery-images.json
          git commit -m "chore: update gallery images"
          git push

      - name: Build site
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Deploy to GitHub Pages
        if: steps.diff.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
